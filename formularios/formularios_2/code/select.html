  <main>
    <h2>Ejemplo de radio</h2>

    <form action="#" method="get">
      <label for="size">Seleccione la talla</label>
      <select name="size" id="size" required><!-- Con required toda opcion con value va ser obligatorio,
        y la primera opcion con el - no va ser valida-->
        <option value="">-</option><!-- Ponemos un - para que aparezca como primera opcion y no una talla -->
        <option value="39">Talla 39</option>
        <option value="40">Talla 40</option>
        <option value="41">Talla 41</option>
        <option value="42">Talla 42</option>
        <option value="43">Talla 43</option>
      </select>
  
      <div>
        <p>
          <button>Enviar</button>
        </p>
      </div>
    </form>
