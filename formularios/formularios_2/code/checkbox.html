  <main>
    <h2>Ejemplo de checkbox</h2>
    <!-- Los checkbox son varias opciones incluyentes(como un multiple choice) donde se puede elegir ninguno, uno o
     varias de las opciones como por ej: ingredientes de una pizza-->

    <form action="#" method="get">
      <p>Seleccione los ingredientes de su pizza</p>
      <div>
        <p> <!-- Con la p hacemos un salto de linea -->
          <!-- Cada name debe tener su nombre diferente o correspondiente en este caso al ingrediente 
           de pizza -->
          <input type="checkbox" name="tomate" id="tomato">
          <label for="tomato">Tomate</label>
          <!-- Mediante la etiqueta label y su atributo for y la etiqueta input con su atributo id, 
           enlasamos el texto que ve el usuario con el radiobutton id='tomato'-> for='tomato', asi al pinchar
           en el texto tambien se marca la opcion-->
        </p>
        <p>
          <input type="checkbox" name="queso" id="cheese">
          <label for="cheese">Queso</label>
        </p>
        <p>
          <input type="checkbox" name="peperoni" id="pepe">
          <label for="pepe">Peperoni</label>
        </p>
      </div>
  

      <div>
        <p>
          <button>Enviar</button>
        </p>
      </div>
    </form>



  </main>
