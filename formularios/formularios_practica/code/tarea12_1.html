<!doctype html>
<html lang="es">

<head>

  <!-- Título para el navegador y los buscadores -->
  <title>Clase 12</title>

  <!-- Descripción de la página para los buscadores -->
  <meta name="description" content="Página de ejemplos vistos en la clase 5: Texto en HTML">

  <!-- Palabras clave para los buscadores -->
  <meta name="keywords" content="p, h1, h2, h3, h4, h5">

  <!-- Autor de la página -->
  <meta name="author" content="@bienvenidosaez">

  <!-- Favicon de la página -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <!-- Codificación-->
  <meta charset="UTF-8">

  <!-- Para que la web sea responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Para algunos navegadores móviles -->
  <meta name="theme-color" content="#1e7bbf">

</head>

<body>
  <header>
    <h1>Practica 12.1</h1>
    <a href="index.html">👈 Volver atras</a>
    <hr>
  </header>
  <main>
    <h1>Formulario de registro - Mi web</h1>
    <form action="" method="get">
      <fieldset>
        <legend>Datos Personales</legend>
        <p>
          <label for="name">Nombre</label>
          <input type="text" name="nombre" id="name" maxlength="50">
        </p>
        <p>
          <label for="ape">Apellido</label>
          <input type="text" name="lastname" id="ape" maxlength="50">
        </p>
        <p>
          Sexo: <br>
          <input type="radio" name="sexo" id="h">
          <label for="h">Hombre</label>
        </p>
        <p>
          <input type="radio" name="sexo" id="">
          <label for="m">Mujer</label>
        </p>
        <p>
          <label for="mail">Mail</label>
          <input type="email" name="email" id="mail">
        </p>
      </fieldset>
      <p>
        <label for="po">Poblacion</label>
        <select name="poblacion" id="po" required>
          <option value="">-</option>
          <option value="A">Alicante</option>
          <option value="M">Madrid</option>
          <option value="S">Sevilla</option>
          <option value="V">Valencia</option>
        </select>
      </p>
      <p>
        <label for="tex">Descripcion</label><br>
        <textarea name="descripcion" id="tex" cols="40" rows="10" placeholder="Escriba aqui..."></textarea>
      </p>

      <p>
        <input type="checkbox" name="news" id="news" checked>
        <label for="news">Deseo recibir infirmacion sobre novedades y ofertas.</label>
      </p>
      <p>
        <input type="checkbox" name="privacy" id="dec" required>
        <label for="dec">Declaro haber leido y aceptar las condiciones generales
          del programa y la normativa sobre la proteccion de datos.
        </label>
      </p>
      <p><button>Enviar</button></p>
    </form>
  </main>

  <hr>
  <footer>
    © Matias Baez 2026 - Todos los derechos reservados
  </footer>
</body>

</html>
